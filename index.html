<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel Assistant ✈️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />

  <style>
    /* ── Design Tokens ───────────────────────────────────────────── */
    :root {
      --sea:        #0077b6;
      --sea-deep:   #023e8a;
      --sea-light:  #48cae4;
      --sand:       #f8f3e8;
      --sand-dark:  #ede5d0;
      --white:      #ffffff;
      --ink:        #0d1b2a;
      --ink-muted:  #4a5568;
      --accent:     #f77f00;
      --accent-warm:#ffd166;
      --bubble-user:   #023e8a;
      --bubble-bot:    #ffffff;
      --radius-lg:  18px;
      --radius-md:  12px;
      --shadow:     0 8px 32px rgba(0,119,182,0.13);
      --transition: 0.22s cubic-bezier(.4,0,.2,1);
    }

    /* ── Reset ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--sand);
      color: var(--ink);
      overflow: hidden;
    }

    /* ── Background texture ──────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 0%,  rgba(72,202,228,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 100%, rgba(2,62,138,0.14) 0%, transparent 55%),
        radial-gradient(ellipse 40% 40% at 50% 50%,  rgba(247,127,0,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── App shell ───────────────────────────────────────────────── */
    #app {
      position: relative; z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 820px;
      margin: 0 auto;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 24px 14px;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(16px);
      border-bottom: 1.5px solid rgba(0,119,182,0.12);
    }

    .header-icon {
      width: 46px; height: 46px;
      background: linear-gradient(135deg, var(--sea-light), var(--sea));
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 4px 14px rgba(0,119,182,0.3);
      flex-shrink: 0;
    }

    .header-text h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--sea-deep);
      line-height: 1.1;
    }

    .header-text p {
      font-size: 0.78rem;
      color: var(--ink-muted);
      font-weight: 300;
      margin-top: 1px;
    }

    .status-dot {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      font-size: 0.75rem; color: #2d9e5c; font-weight: 500;
    }
    .status-dot::before {
      content: '';
      width: 8px; height: 8px;
      background: #2d9e5c;
      border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(45,158,92,0.2);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 3px rgba(45,158,92,0.2); }
      50%      { box-shadow: 0 0 0 6px rgba(45,158,92,0.08); }
    }

    /* ── Chat window ─────────────────────────────────────────────── */
    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 28px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }

    #chat-window::-webkit-scrollbar { width: 6px; }
    #chat-window::-webkit-scrollbar-track { background: transparent; }
    #chat-window::-webkit-scrollbar-thumb {
      background: rgba(0,119,182,0.2);
      border-radius: 99px;
    }

    /* ── Message bubbles ─────────────────────────────────────────── */
    .message {
      display: flex;
      gap: 10px;
      animation: fadeUp 0.28s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user  { flex-direction: row-reverse; }
    .message.bot   { flex-direction: row; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
      align-self: flex-end;
    }
    .message.user .avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent-warm));
      box-shadow: 0 3px 10px rgba(247,127,0,0.3);
    }
    .message.bot .avatar {
      background: linear-gradient(135deg, var(--sea-light), var(--sea));
      box-shadow: 0 3px 10px rgba(0,119,182,0.25);
    }

    .bubble {
      max-width: 74%;
      padding: 12px 16px;
      border-radius: var(--radius-lg);
      font-size: 0.91rem;
      line-height: 1.62;
      position: relative;
    }
    .message.user .bubble {
      background: var(--bubble-user);
      color: var(--white);
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 18px rgba(2,62,138,0.22);
    }
    .message.bot .bubble {
      background: var(--bubble-bot);
      color: var(--ink);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(0,119,182,0.08);
    }

    /* ── Formatted bot content ───────────────────────────────────── */
    .bubble-content p           { margin-bottom: 6px; }
    .bubble-content ul          { padding-left: 16px; margin: 4px 0 10px; }
    .bubble-content li          { margin-bottom: 3px; }
    .bubble-content strong      { font-weight: 600; color: var(--sea-deep); }
    .bubble-content .section-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.97rem;
      color: var(--sea-deep);
      margin: 12px 0 6px;
      display: flex; align-items: center; gap: 6px;
    }
    .bubble-content .section-title:first-child { margin-top: 0; }
    .bubble-content a {
      color: var(--sea);
      font-size: 0.82rem;
      font-weight: 500;
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px;
      background: rgba(0,119,182,0.08);
      border-radius: 6px;
      margin: 2px 0;
      transition: background var(--transition), color var(--transition);
    }
    .bubble-content a:hover {
      background: var(--sea);
      color: var(--white);
    }
    .bubble-content .link-row   { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }

    /* ── Typing indicator ────────────────────────────────────────── */
    #typing-indicator { display: none; }
    #typing-indicator.visible { display: flex; }

    .typing-dots {
      display: flex; gap: 5px;
      align-items: center;
      padding: 14px 18px;
    }
    .typing-dots span {
      width: 7px; height: 7px;
      background: var(--sea-light);
      border-radius: 50%;
      animation: bounce 1.1s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .18s; }
    .typing-dots span:nth-child(3) { animation-delay: .36s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0);   opacity: .5; }
      40%          { transform: translateY(-7px); opacity: 1; }
    }

    /* ── Input area ──────────────────────────────────────────────── */
    #input-area {
      padding: 14px 20px 20px;
      background: rgba(255,255,255,0.80);
      backdrop-filter: blur(16px);
      border-top: 1.5px solid rgba(0,119,182,0.10);
    }

    .quick-prompts {
      display: flex; flex-wrap: wrap; gap: 7px;
      margin-bottom: 12px;
    }
    .quick-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.76rem;
      color: var(--sea-deep);
      background: rgba(0,119,182,0.07);
      border: 1.5px solid rgba(0,119,182,0.18);
      border-radius: 20px;
      padding: 5px 13px;
      cursor: pointer;
      transition: all var(--transition);
      font-weight: 500;
    }
    .quick-btn:hover {
      background: var(--sea);
      color: var(--white);
      border-color: var(--sea);
      transform: translateY(-1px);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      padding: 12px 16px;
      border: 2px solid rgba(0,119,182,0.18);
      border-radius: var(--radius-lg);
      background: var(--white);
      color: var(--ink);
      resize: none;
      min-height: 48px;
      max-height: 130px;
      overflow-y: auto;
      line-height: 1.5;
      transition: border-color var(--transition), box-shadow var(--transition);
      outline: none;
    }
    #user-input::placeholder { color: #a0aec0; }
    #user-input:focus {
      border-color: var(--sea);
      box-shadow: 0 0 0 3px rgba(0,119,182,0.12);
    }

    #send-btn {
      width: 48px; height: 48px;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--sea), var(--sea-deep));
      border: none;
      border-radius: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(2,62,138,0.3);
      transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition);
    }
    #send-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(2,62,138,0.4);
    }
    #send-btn:active:not(:disabled) { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #send-btn svg { width: 20px; height: 20px; }

    /* ── Welcome splash ──────────────────────────────────────────── */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 50px 24px 10px;
      gap: 14px;
      animation: fadeUp 0.5s ease both;
    }
    #welcome .big-icon {
      font-size: 56px;
      filter: drop-shadow(0 6px 18px rgba(0,119,182,0.25));
      animation: float 3.5s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }
    #welcome h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.55rem;
      font-weight: 800;
      color: var(--sea-deep);
      letter-spacing: -0.03em;
    }
    #welcome p {
      font-size: 0.9rem;
      color: var(--ink-muted);
      max-width: 380px;
      line-height: 1.6;
    }

    /* ── Error toast ─────────────────────────────────────────────── */
    #error-toast {
      display: none;
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: #e53e3e;
      color: white;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 0.85rem;
      z-index: 999;
      box-shadow: 0 4px 16px rgba(229,62,62,0.4);
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="header-icon">🌍</div>
    <div class="header-text">
      <h1>Travel Assistant</h1>
      <p>Stay · Eat · Travel</p>
    </div>
    <div class="status-dot">Online</div>
  </header>

  <!-- Chat Window -->
  <div id="chat-window">
    <!-- Welcome splash (hidden after first message) -->
    <div id="welcome">
      <div class="big-icon">✈️</div>
      <h2>Where do you want to travel?</h2>
      <p>Ask me about any destination and I'll give you useful tips for accommodation, food, and transportation — with active search links! You can write in any language and I'll reply in the same one.</p>
    </div>

    <!-- Typing indicator -->
    <div class="message bot" id="typing-indicator">
      <div class="avatar">🤖</div>
      <div class="bubble">
        <div class="typing-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Input Area -->
  <div id="input-area">
    <div class="quick-prompts">
      <button class="quick-btn" onclick="quickPrompt('Trip to Rome')">🏛️ Rome</button>
      <button class="quick-btn" onclick="quickPrompt('Trip to Paris')">🗼 Paris</button>
      <button class="quick-btn" onclick="quickPrompt('Trip to Barcelona')">🌊 Barcelona</button>
      <button class="quick-btn" onclick="quickPrompt('Trip to London')">🎡 London</button>
      <button class="quick-btn" onclick="quickPrompt('Trip to Tokyo')">🗾 Tokyo</button>
    </div>
    <div class="input-row">
      <textarea
        id="user-input"
        placeholder="e.g. 'I want to travel to Santorini in August' (any language)"
        rows="1"
      ></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<div id="error-toast"></div>

<script>
  // ── Config ──────────────────────────────────────────────────────
  // LOCAL: 'http://localhost:8000/chat'
  // PRODUCTION: replace with your Railway URL (must end in /chat)
  const API_URL = 'http://localhost:8000/chat';

  // ── State ────────────────────────────────────────────────────────
  let conversationHistory = [];
  let isLoading = false;

  // ── DOM refs ─────────────────────────────────────────────────────
  const chatWindow     = document.getElementById('chat-window');
  const userInput      = document.getElementById('user-input');
  const sendBtn        = document.getElementById('send-btn');
  const typingIndicator= document.getElementById('typing-indicator');
  const welcome        = document.getElementById('welcome');
  const errorToast     = document.getElementById('error-toast');

  // ── Auto-grow textarea ───────────────────────────────────────────
  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 130) + 'px';
  });

  // ── Enter to send (Shift+Enter = newline) ────────────────────────
  userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ── Quick-prompt buttons ─────────────────────────────────────────
  function quickPrompt(text) {
    userInput.value = text;
    userInput.dispatchEvent(new Event('input'));
    sendMessage();
  }

  // ── Append a message bubble ──────────────────────────────────────
  function appendMessage(role, rawText) {
    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    const content = document.createElement('div');
    content.className = 'bubble-content';
    content.innerHTML = role === 'bot' ? formatBotMessage(rawText) : escapeHtml(rawText);

    bubble.appendChild(content);
    wrap.appendChild(avatar);
    wrap.appendChild(bubble);

    // Insert before typing indicator
    chatWindow.insertBefore(wrap, typingIndicator);
    scrollToBottom();
    return wrap;
  }

  // ── Format bot markdown-ish text into styled HTML ────────────────
  function formatBotMessage(text) {
    // Split on section titles (lines starting with emoji + word)
    let lines = text.split('\n');
    let html  = '';
    let linkBuffer = [];

    const flushLinks = () => {
      if (linkBuffer.length) {
        html += `<div class="link-row">${linkBuffer.join('')}</div>`;
        linkBuffer = [];
      }
    };

    lines.forEach(line => {
      line = line.trimEnd();
      if (!line) { flushLinks(); return; }

      // Section title: emoji at start + non-bullet text
      if (/^[🏨🍔✈️🌍🏖️🚗🛏️]\s/.test(line) && !line.startsWith('•')) {
        flushLinks();
        html += `<div class="section-title">${escapeHtml(line)}</div>`;
      }
      // Link line
      else if (/^🔗/.test(line)) {
        const match = line.match(/^🔗\s*(.*?):\s*(https?:\/\/\S+)/);
        if (match) {
          linkBuffer.push(
            `<a href="${match[2]}" target="_blank" rel="noopener">🔗 ${escapeHtml(match[1])}</a>`
          );
        } else {
          html += `<p>${escapeHtml(line)}</p>`;
        }
      }
      // Bullet point
      else if (/^•/.test(line)) {
        flushLinks();
        html += `<p style="padding-left:4px">• ${escapeHtml(line.slice(1).trim())}</p>`;
      }
      // Plain text
      else {
        flushLinks();
        html += `<p>${escapeHtml(line)}</p>`;
      }
    });

    flushLinks();
    return html;
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Show / hide typing indicator ─────────────────────────────────
  function setLoading(state) {
    isLoading = state;
    sendBtn.disabled = state;
    typingIndicator.classList.toggle('visible', state);
    if (state) scrollToBottom();
  }

  // ── Scroll to bottom of chat ─────────────────────────────────────
  function scrollToBottom() {
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  // ── Show error toast ─────────────────────────────────────────────
  function showError(msg) {
    errorToast.textContent = msg;
    errorToast.style.display = 'block';
    setTimeout(() => { errorToast.style.display = 'none'; }, 4000);
  }

  // ── Main send function ───────────────────────────────────────────
  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text || isLoading) return;

    // Hide welcome splash on first message
    welcome.style.display = 'none';

    // Render user bubble
    appendMessage('user', text);

    // Clear input
    userInput.value = '';
    userInput.style.height = 'auto';

    // Show loader
    setLoading(true);

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          conversation_history: conversationHistory,
        }),
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.detail || `HTTP ${response.status}`);
      }

      const data = await response.json();
      conversationHistory = data.conversation_history;

      setLoading(false);
      appendMessage('bot', data.reply);

    } catch (err) {
      setLoading(false);
      showError(`⚠️ Error: ${err.message}`);
      console.error('API error:', err);
    }
  }
</script>
</body>
</html>
